name: Weekly Newsletter

on:
  schedule:
    - cron: '0 7 * * 1'  # Every Monday at 8am Paris time (UTC+1)
  workflow_dispatch:       # Allow manual trigger from GitHub UI for testing

jobs:
  send-newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r mooroon5-news-service/requirements.txt

      - name: Run newsletter
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: python mooroon5-news-service/main.py
